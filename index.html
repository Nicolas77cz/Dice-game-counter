<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kostky PRO</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #60a5fa;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 500px; width: 100%; }

        /* 3D Tlačítka */
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.1s;
            box-shadow: 0 4px 0 var(--primary-dark);
            background: var(--primary);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--primary-dark);
        }

        button.secondary { background: #475569; box-shadow: 0 4px 0 #1e293b; }
        button.danger { background: var(--danger); box-shadow: 0 4px 0 #991b1b; }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        /* Hlavní vstupní pole */
        .input-zone { text-align: center; }
        .active-player-name { color: var(--accent); font-size: 1.4rem; margin-bottom: 10px; font-weight: bold; }
        input[type="number"] {
            width: 80%; padding: 15px; font-size: 1.5rem; border-radius: 10px;
            border: 2px solid #334155; background: #0f172a; color: white; text-align: center; margin-bottom: 15px;
        }

        /* Knihovna a seznam */
        .library-item {
            display: inline-block; padding: 8px 15px; margin: 4px;
            background: #334155; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
        }
        .library-item.active { background: var(--primary); border: 1px solid var(--accent); }

        /* Tabulka hráčů */
        .score-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .score-table th { text-align: left; color: var(--accent); border-bottom: 1px solid #334155; padding: 10px; }
        .score-table td { padding: 12px 10px; border-bottom: 1px solid #334155; }
        .current-turn { background: rgba(59, 130, 246, 0.1); }
        
        .history-btn { font-size: 0.7rem; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--accent);">🎲 KOSTKY PRO</h2>

    <div class="card input-zone" id="playPanel" style="display:none;">
        <div class="active-player-name" id="currentPlayerDisplay">Na řadě: -</div>
        <input type="number" id="mainInput" placeholder="Zadej hod (min 350)" inputmode="numeric">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="submitTurn()">Zapsat body</button>
            <button class="secondary" onclick="submitZero()">Zapsat 0</button>
            <button class="danger secondary history-btn" onclick="undoLastMove()">↩ Krok zpět</button>
            <button class="secondary history-btn" onclick="nextPlayer()">Přeskočit hráče</button>
        </div>
    </div>

    <div class="card">
        <div id="playerLibrary"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="newName" placeholder="Jméno..." style="flex:1; padding: 8px; border-radius: 5px; border:1px solid #334155; background:#0f172a; color:white;">
            <button onclick="addNewPlayer()">+</button>
        </div>
    </div>

    <div class="card">
        <table class="score-table">
            <thead>
                <tr><th>Hráč</th><th>Body</th><th>Nuly</th></tr>
            </thead>
            <tbody id="scoreBody"></tbody>
        </table>
        <div style="margin-top: 15px; display: flex; gap: 5px;">
            <label style="font-size: 0.8rem;"><input type="checkbox" id="exactMode" onchange="save()"> Přesných 10k</label>
            <button class="danger history-btn" style="margin-left: auto;" onclick="resetScores()">Nová hra</button>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('dice_players')) || [];
    let activeIndex = 0;
    let history = []; // Pro krok zpět

    function vibrate() { if (navigator.vibrate) navigator.vibrate(40); }

    function save() {
        localStorage.setItem('dice_players', JSON.stringify(players));
        render();
    }

    function addNewPlayer() {
        const name = document.getElementById('newName').value.trim();
        if (name) {
            players.push({ id: Date.now(), name, score: 0, zeros: 0, active: true });
            document.getElementById('newName').value = "";
            vibrate();
            save();
        }
    }

    function toggleActive(id) {
        const p = players.find(p => p.id === id);
        p.active = !p.active;
        vibrate();
        save();
    }

    function nextPlayer() {
        const activeOnes = players.filter(p => p.active);
        if (activeOnes.length > 0) {
            activeIndex = (activeIndex + 1) % activeOnes.length;
        }
        render();
    }

    function submitTurn() {
        const input = document.getElementById('mainInput');
        const val = parseInt(input.value);
        if (isNaN(val) || val < 350) { alert("Minimum je 350!"); return; }
        
        processMove(val);
        input.value = "";
    }

    function submitZero() { processMove(0); }

    function processMove(points) {
        const activeOnes = players.filter(p => p.active);
        if (activeOnes.length === 0) return;
        
        const p = activeOnes[activeIndex];
        
        // Uložit do historie pro "Krok zpět"
        history.push(JSON.parse(JSON.stringify(players)));
        if (history.length > 10) history.shift();

        vibrate();

        if (points === 0) {
            p.zeros++;
            if (p.zeros >= 3) {
                alert(p.name + " má 3 nuly! Skóre jde na 0.");
                p.score = 0; p.zeros = 0;
            }
        } else {
            p.zeros = 0;
            let target = p.score + points;
            const isExact = document.getElementById('exactMode').checked;

            if (target >= 10000) {
                if (isExact) {
                    if (target === 10000) { p.score = 10000; alert("VÍTĚZ: " + p.name); }
                    else { p.score -= points; if(p.score < 0) p.score = 0; alert("Přehozeno! Odečítám."); }
                } else { p.score = target; alert("VÍTĚZ: " + p.name); }
            } else {
                p.score = target;
            }
        }
        
        activeIndex = (activeIndex + 1) % activeOnes.length;
        save();
    }

    function undoLastMove() {
        if (history.length > 0) {
            players = history.pop();
            // Vrátit index o jednoho zpět
            const activeOnes = players.filter(p => p.active);
            activeIndex = (activeIndex - 1 + activeOnes.length) % activeOnes.length;
            vibrate();
            save();
        }
    }

    function resetScores() {
        if(confirm("Vynulovat body?")) {
            players.forEach(p => { p.score = 0; p.zeros = 0; });
            activeIndex = 0;
            history = [];
            save();
        }
    }

    function render() {
        const lib = document.getElementById('playerLibrary');
        const body = document.getElementById('scoreBody');
        const activeOnes = players.filter(p => p.active);
        
        // Knihovna
        lib.innerHTML = players.map(p => `
            <div class="library-item ${p.active ? 'active' : ''}" onclick="toggleActive(${p.id})">
                ${p.name}
            </div>
        `).join('');

        // Tabulka a Aktivní panel
        body.innerHTML = "";
        document.getElementById('playPanel').style.display = activeOnes.length ? 'block' : 'none';

        activeOnes.forEach((p, index) => {
            const isCurrent = index === activeIndex;
            if (isCurrent) {
                document.getElementById('currentPlayerDisplay').innerText = "Na řadě: " + p.name;
            }
            
            const row = document.createElement('tr');
            if (isCurrent) row.className = "current-turn";
            row.innerHTML = `
                <td>${isCurrent ? '➔ ' : ''}${p.name}</td>
                <td class="score">${p.score}</td>
                <td>${p.zeros}/3</td>
            `;
            body.appendChild(row);
        });
    }

    // Registrace Service Workeru
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
