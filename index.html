<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kostky PRO</title>
    <link rel="manifest" href="manifest.json">
    <link id="themeLink" rel="stylesheet" href="style-dark.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--accent);">🎲 KOSTKY PRO</h2>
    
    <div style="text-align: right; margin-bottom: 10px; display: flex; justify-content: flex-end; gap: 5px;">
        <button class="secondary" onclick="openRules()">📖 Pravidla</button>
        <button class="secondary" onclick="toggleTheme()" id="themeBtn">☀️ Světlý režim</button>
    </div>

    <div class="card input-zone" id="playPanel" style="display:none;">
        <div class="active-player-name" id="currentPlayerDisplay">Na řadě: -</div>
        <input type="number" id="mainInput" placeholder="Zadej body" inputmode="numeric">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="submitTurn()">Zapsat</button>
            <button class="secondary" onclick="submitZero()">KIKS</button> 
            <button class="danger secondary" onclick="undoLastMove()">↩ Zpět</button>
            <button class="secondary" onclick="nextPlayer()">Další</button>
        </div>
    </div>

    <div class="card">
        <table class="score-table">
            <thead>
                <tr><th>Hráč</th><th>Body</th><th>Kiksy</th></tr> 
            </thead>
            <tbody id="scoreBody"></tbody>
        </table>
        <button class="danger" style="width:100%; margin-top:10px;" onclick="resetScores()">Nová hra</button>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

    <div class="card">
        <h3 style="margin-top:0; font-size: 1rem; opacity: 0.8;">Správa hráčů</h3>
        <div id="playerLibrary"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="newName" placeholder="Jméno..." style="flex:1; margin-bottom:0;">
            <button onclick="addNewPlayer(false)">+</button>
            <button class="secondary" onclick="addNewPlayer(true)">🤖</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 1rem; opacity: 0.8;">Nastavení hry</h3>
        <div class="settings-grid">
            <div style="grid-column: span 2;">
                Cíl: 
                <select id="targetScore" onchange="updateSettings()">
                    <option value="4000">4 000</option>
                    <option value="5000">5 000</option>
                    <option value="7500">7 500</option>
                    <option value="10000" selected>10 000</option>
                </select>
            </div>
            <div style="grid-column: span 2;">
                Obtížnost BOTa:
                <select id="botDiff" onchange="botDifficulty = this.value">
                    <option value="conservative">Opatrný (Konzerva)</option>
                    <option value="normal" selected>Normální</option>
                    <option value="crazy">Hazardér (Blázen)</option>
                </select>
            </div>
            <div>
                Vstup:
                <input type="number" id="entryLimit" step="50" value="350" onchange="updateSettings()">
            </div>
            <div>
                Kolo:
                <input type="number" id="turnLimit" step="50" value="350" onchange="updateSettings()">
            </div>
            <div style="grid-column: span 2; text-align: left; font-size: 0.8rem;">
                <label><input type="checkbox" id="syncLimits" checked onchange="toggleSync()"> Shodné limity</label>
                <br>
                <label><input type="checkbox" id="zilchMode" onchange="updateSettings()"> Režim ZILCH (přesné body)</label>
            </div>
        </div>
    </div>
</div>

<div id="rulesModal" class="modal" onclick="closeRules()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Pravidla hry</h3>
        <div id="rulesContent" style="max-height: 60vh; overflow-y: auto; text-align: left; font-size: 0.9rem;"></div>
        <button style="width:100%; margin-top: 15px;" onclick="closeRules()">Zavřít</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
